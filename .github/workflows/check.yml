name: Build check

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*" # We don't want this to run on release
  pull_request:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      BOOST_ROOT: C:/local/boost_1_83_0
      WXWIN: C:/local/wxWidgets-3.3.2
    steps:
      - uses: actions/checkout@master

      - name: Prepare version
        shell: powershell
        id: setup
        run: |
          $os="windows"
          $ccx_version="${{ github.sha }}".SubString(0,7)
          $release_name="ccx-cli-$os-dev-$ccx_version"
          echo "release_name=${release_name}" >> $env:GITHUB_OUTPUT

      - name: Install msbuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore Boost
        uses: actions/cache@v5
        id: restore-boost
        with:
          path: ${{env.BOOST_ROOT}}
          key: boost_1_83_0-msvc-14.3-64

      - name: Install Boost
        if: steps.restore-boost.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $Url = "https://archives.boost.io/release/1.83.0/binaries/boost_1_83_0-msvc-14.3-64.exe"
          (New-Object System.Net.WebClient).DownloadFile($Url, "$env:TEMP\boost.exe")
          Start-Process -Wait -FilePath "$env:TEMP\boost.exe" "/SILENT","/SP-","/SUPPRESSMSGBOXES","/DIR=${env:BOOST_ROOT}"

      - name: Restore wxWidgets
        uses: actions/cache@v5
        id: restore-wxwidgets
        with:
          path: ${{ env.WXWIN }}
          key: wxwidgets-3.3.2-msvc-vc14x-x64

      - name: Install wxWidgets
        if: steps.restore-wxwidgets.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $wxVersion = "3.3.2"
          $wxRoot = $env:WXWIN
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          New-Item -ItemType Directory -Force -Path $wxRoot | Out-Null
          $baseUrl = "https://github.com/wxWidgets/wxWidgets/releases/download/v$wxVersion"
          $archives = @(
            "wxWidgets-$wxVersion-headers.7z",
            "wxMSW-${wxVersion}_vc14x_x64_Dev.7z",
            "wxMSW-${wxVersion}_vc14x_x64_ReleaseDLL.7z"
          )
          foreach ($archive in $archives) {
            $dest = Join-Path $env:TEMP $archive
            Write-Host "Downloading $archive..."
            Invoke-WebRequest -Uri "$baseUrl/$archive" -OutFile $dest
            & $sevenZip x $dest "-o$wxRoot" -y | Out-Null
          }

      - name: Build
        shell: powershell
        id: build
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_MIGRATION_GUI=ON -DWITH_OPENCL=OFF `
            -DwxWidgets_ROOT_DIR="$env:WXWIN" `
            -DwxWidgets_LIB_DIR="$env:WXWIN/lib/vc14x_x64_dll"
          msbuild concealX.sln /p:Configuration=Release /m:2

      - name: Prepare release
        shell: powershell
        run: |
          mkdir build/conceal
          mv build/src/Release/conceald.exe build/conceal
          mv build/src/Release/concealwallet.exe build/conceal
          mv build/src/Release/conceal-wallet.exe build/conceal
          mv build/src/Tools/Release/conceal-optimizer.exe build/conceal
          mv build/src/Release/conceal-rpc.exe build/conceal
          mv build/src/Tools/Release/conceald-migrate.exe build/conceal
          mv build/src/Tools/Migration-gui/Release/conceald-migrate-gui.exe build/conceal
          cp $env:WXWIN/lib/vc14x_x64_dll/wx*.dll build/conceal
          cp build/tests/Release/*_tests.exe build/conceal

      - name: Upload To GH Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.setup.outputs.release_name }}
          path: build/conceal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: core_tests
        shell: powershell
        run: |
          cd build/conceal
          ./core_tests.exe --generate_and_play_test_data

      - name: difficulty_tests
        shell: powershell
        run: |
          cp tests/Difficulty/data.txt build/conceal
          cd build/conceal
          ./difficulty_tests.exe data.txt

      - name: performance_tests
        shell: powershell
        run: |
          cd build/conceal
          ./performance_tests.exe

      - name: unit_tests
        shell: powershell
        run: |
          cd build/tests
          ctest -R UnitTests --output-on-failure

  build-mingw:
    name: MinGW
    runs-on: windows-2022
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@master

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake

      - name: Install dependencies
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-boost mingw-w64-x86_64-wxwidgets3.2-msw

      - name: Prepare version
        shell: powershell
        id: setup
        run: |
          $os="mingw"
          $ccx_version="${{ github.sha }}".SubString(0,7)
          $release_name="ccx-cli-$os-dev-$ccx_version"
          echo "release_name=${release_name}" >> $env:GITHUB_OUTPUT

      - name: Build
        shell: msys2 {0}
        id: build
        run: |
          ls
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DSTATIC=ON -DBUILD_MIGRATION_GUI=ON -DWITH_OPENCL=OFF
          cmake --build . --config Release

      - name: Prepare release
        shell: msys2 {0}
        run: |
          mkdir build/conceal
          mv build/src/conceald.exe build/conceal
          mv build/src/concealwallet.exe build/conceal
          mv build/src/conceal-wallet.exe build/conceal
          mv build/src/Tools/conceal-optimizer.exe build/conceal
          mv build/src/conceal-rpc.exe build/conceal
          mv build/src/Tools/conceald-migrate.exe build/conceal
          mv build/src/Tools/Migration-gui/conceald-migrate-gui.exe build/conceal
          cp /mingw64/bin/wx*.dll build/conceal
          cp build/tests/*_tests.exe build/conceal

      - name: Upload To GH Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.setup.outputs.release_name }}
          path: build/conceal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: core_tests
        shell: powershell
        run: |
          cd build/conceal
          ./core_tests.exe --generate_and_play_test_data

      - name: difficulty_tests
        shell: powershell
        run: |
          cp tests/Difficulty/data.txt build/conceal
          cd build/conceal
          ./difficulty_tests.exe data.txt

      - name: performance_tests
        shell: powershell
        run: |
          cd build/conceal
          ./performance_tests.exe

      - name: unit_tests
        shell: powershell
        run: |
          cd build/tests
          ctest -R UnitTests --output-on-failure

  build-ubuntu22:
    name: Ubuntu 22.04
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@master

      - name: Prepare version
        id: setup
        run: |
          os=ubuntu-22.04
          ccx_version=${GITHUB_SHA::7}
          release_name=ccx-cli-"$os"-dev-"$ccx_version"
          echo "release_name=${release_name}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake gcc g++ libboost-all-dev
          sudo apt-get install -y libwxgtk3.2-gtk3-dev || sudo apt-get install -y libwxgtk3.0-gtk3-dev

      - name: Build
        id: build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DSTATIC=ON -DWITH_OPENCL=OFF
          make -j2

      - name: Prepare release
        run: |
          mkdir build/conceal
          mv build/src/conceald build/conceal
          mv build/src/concealwallet build/conceal
          mv build/src/conceal-wallet build/conceal
          mv build/src/Tools/conceal-optimizer build/conceal
          mv build/src/conceal-rpc build/conceal
          mv build/src/Tools/conceald-migrate build/conceal
          mv build/src/Tools/Migration-gui/conceald-migrate-gui build/conceal
          cp build/tests/*_tests build/conceal

      - name: Upload To GH Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.setup.outputs.release_name }}
          path: build/conceal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: core_tests
        run: |
          cd build/conceal
          ./core_tests --generate_and_play_test_data

      - name: difficulty_tests
        run: |
          cp tests/Difficulty/data.txt build/conceal
          cd build/conceal
          ./difficulty_tests data.txt

      - name: performance_tests
        run: |
          cd build/conceal
          ./performance_tests

      - name: system_tests
        run: |
          cd build/conceal
          ./system_tests

      - name: unit_tests
        run: |
          cd build/tests
          ctest -R UnitTests --output-on-failure

