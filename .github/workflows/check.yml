  build-macos:
    name: macOS
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@master

      - name: Prepare version
        id: setup
        run: |
          os=macos-15-intel
          ccx_version=${GITHUB_SHA::7}
          release_name=ccx-cli-"$os"-dev-"$ccx_version"
          echo "release_name=${release_name}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          brew install boost wxwidgets
          brew list --versions boost

      - name: Build
        id: build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DSTATIC=ON -DWITH_OPENCL=OFF -DBOOST_ROOT="$(brew --prefix boost)"
          make -j2

      - name: Prepare release
        run: |
          mkdir build/conceal
          mv build/src/conceald build/conceal
          mv build/src/concealwallet build/conceal
          mv build/src/conceal-wallet build/conceal
          mv build/src/Tools/conceal-optimizer build/conceal
